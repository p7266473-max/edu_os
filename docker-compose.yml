# ─────────────────────────────────────────────────────────────────────────────
# EduOS Master Interface — Unified Multi-Service Stack
# CasaOS-native  |  GitHub CI/CD  |  Internal networking
#
# ARCHITECTURE:
#   CasaOS Dashboard (Master Interface)
#     ├── eduos_app    → :3000  Reflex Educational UI  (custom-built, GHCR)
#     └── eduos_webtop → :3001  Ubuntu XFCE Desktop    (LinuxServer upstream)
#
#   Internal Docker network "eduos_net":
#     eduos_app    reachable at http://eduos_app:3000  (frontend)
#                               http://eduos_app:8000  (FastAPI backend)
#     eduos_webtop reachable at http://eduos_webtop:3000
#
# CASAOS INSTALL:
#   Dashboard → App Store → Custom Install → Import → paste this file → Install
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

name: eduos

# Load overrides from .env file (create from .env.example)
# e.g.  TZ=Africa/Lagos  PASSWORD=mysecretpass  CASAOS_DATA_DIR=/mnt/data/eduos

services:

  # ══════════════════════════════════════════════════════════════════════════
  # SERVICE 1 — EduOS  (Reflex Python App)
  # CasaOS tile: "EduOS"  → http://<host>:3000
  # ══════════════════════════════════════════════════════════════════════════
  eduos:
    image: ghcr.io/p7266473-max/edu_os:latest
    container_name: eduos_app
    hostname: eduos_app                # DNS name on eduos_net
    restart: unless-stopped
    pull_policy: always

    ports:
      - "3000:3000"    # Reflex Next.js frontend
      - "8080:8000"    # FastAPI backend (accessible on host via 8080, internally on 8000)

    volumes:
      - type: bind
        source: ${CASAOS_DATA_DIR:-~/casaos/eduos}/study_materials
        target: /app/data/study_materials

      - type: bind
        source: ${CASAOS_DATA_DIR:-~/casaos/eduos}/notes
        target: /app/data/notes

      - eduos_web_cache:/app/.web

    environment:
      - PYTHONUNBUFFERED=1
      - REFLEX_ENV=prod
      - STUDY_MATERIALS_PATH=/app/data/study_materials
      - NOTES_PATH=/app/data/notes
      # Internal addresses — usable by other services on eduos_net
      - INTERNAL_FRONTEND=http://eduos_app:3000
      - INTERNAL_API=http://eduos_app:8000

    networks:
      eduos_net:
        aliases:
          - eduos_app    # resolvable by this name inside the network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    labels:
      # ── CasaOS tile ───────────────────────────────────────────────────────
      casaos.name:        "EduOS"
      casaos.description: "Educational OS desktop — Reflex + Python"
      casaos.icon:        "https://cdn-icons-png.flaticon.com/512/2436/2436874.png"
      casaos.index:       "/"
      casaos.port.map:    "3000:3000"
      casaos.category:    "Education"
      casaos.author:      "p7266473-max"
      casaos.scheme:      "http"


  # ══════════════════════════════════════════════════════════════════════════
  # SERVICE 2 — Webtop  (Ubuntu XFCE virtual desktop via KasmVNC)
  # CasaOS tile: "EduOS Desktop"  → http://<host>:3001
  # ══════════════════════════════════════════════════════════════════════════
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: eduos_webtop
    hostname: eduos_webtop             # DNS name on eduos_net
    restart: unless-stopped

    # Required for desktop apps (audio, GPU, system calls)
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"

    ports:
      - "3001:3000"    # KasmVNC web desktop

    volumes:
      - webtop_config:/config          # persistent home + desktop config

      # ── Shared data bridge ────────────────────────────────────────────────
      # Files uploaded via CasaOS Files appear on the Webtop Desktop AND
      # inside the Reflex app — single source of truth for study materials.
      - type: bind
        source: ${CASAOS_DATA_DIR:-~/casaos/eduos}/study_materials
        target: /config/Desktop/study_materials

      - type: bind
        source: ${CASAOS_DATA_DIR:-~/casaos/eduos}/notes
        target: /config/Desktop/notes

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - CUSTOM_USER=${WEBTOP_USER:-edu_user}
      - PASSWORD=${WEBTOP_PASSWORD:-eduos2024}
      - SUBFOLDER=/
      - TITLE=EduOS Desktop
      # ── Cross-service URLs (talk to EduOS from inside the desktop) ────────
      # These are available in the Webtop terminal as env vars:
      #   curl $EDUOS_API/api/state       → EduOS kernel state
      #   curl $EDUOS_FRONTEND            → EduOS web UI
      - EDUOS_FRONTEND=http://eduos_app:3000
      - EDUOS_API=http://eduos_app:8000
      # Example usage inside Webtop terminal:
      #   curl $EDUOS_API/api/state | python3 -m json.tool
      #   xdg-open $EDUOS_FRONTEND

    networks:
      eduos_net:
        aliases:
          - eduos_webtop

    depends_on:
      eduos:
        condition: service_healthy     # wait for EduOS to be healthy first

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      # ── CasaOS tile ───────────────────────────────────────────────────────
      casaos.name:        "EduOS Desktop"
      casaos.description: "Ubuntu XFCE virtual desktop — backend workspace"
      casaos.icon:        "https://cdn-icons-png.flaticon.com/512/888/888879.png"
      casaos.index:       "/"
      casaos.port.map:    "3001:3000"
      casaos.category:    "Utilities"
      casaos.author:      "p7266473-max"
      casaos.scheme:      "http"


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  eduos_web_cache:
    driver: local
    labels:
      casaos.description: "Reflex Next.js build cache"

  webtop_config:
    driver: local
    labels:
      casaos.description: "Webtop persistent home directory and desktop config"


# ── Network ───────────────────────────────────────────────────────────────────
networks:
  eduos_net:
    name: eduos_net                    # explicit name so CasaOS displays it cleanly
    driver: bridge
    labels:
      casaos.description: "Internal bridge — EduOS services communicate here"
